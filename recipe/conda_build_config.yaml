binutils_version:
  - 2.44

c_stdlib:                       # [not osx]
  - sysroot                     # [linux]
  - m2w64-sysroot               # [not unix]
c_stdlib_version:
  - 10.13                       # [osx and x86_64]
  - 11.3                        # [osx and arm64]
  - 2.17                        # [linux]
  - 12                          # [not unix]

c_compiler:
  - clang                       # [unix]
  - gcc                         # [not unix]
c_compiler_version:
  - 17                          # [osx]
  - 19                          # [linux]
  - 15                          # [not unix]

cxx_compiler:
  - clangxx                     # [unix]
  - gxx                         # [not unix]
cxx_compiler_version:
  - 17                          # [osx]
  - 19                          # [linux]
  - 15                          # [not unix]
