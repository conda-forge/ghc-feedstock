context:
  version: "9.12.2"
  cabal_version: "3.14.2.0"

package:
  name: ghc
  version: ${{ version }}

source:
  - url: https://downloads.haskell.org/~ghc/${{ version }}/ghc-${{ version }}-src.tar.xz
    sha256: 0e49cd5dde43f348c5716e5de9a5d7a0f8d68d945dc41cf75dfdefe65084f933
    patches:
      - patch-rpath-macos.patch

  # Bootstrap GHC compilers
  - if: osx
    then:
      url: https://downloads.haskell.org/~ghc/${{ version }}/ghc-${{ version }}-x86_64-apple-darwin.tar.xz
      sha256: e7a40e39059dd3619d7884b7382f357e79a0f4e430181b805bdd57b3be9a7300
      target_directory: bootstrap-ghc
  - if: linux
    then:
      url: https://downloads.haskell.org/~ghc/${{ version }}/ghc-${{ version }}-x86_64-ubuntu20_04-linux.tar.xz
      sha256: 0cffff0a74131465bb5d1447400ea46080a10e3cd46d6c9559aa6f2a6a7537ac
      target_directory: bootstrap-ghc
  - if: not unix
    then:
      url: https://downloads.haskell.org/~ghc/${{ version }}/ghc-${{ version }}-x86_64-unknown-mingw32.tar.gz
      sha256: 76847b0125547e975791fdbb9b9c963961aa81d833299d75a37ca48338fcc232
      target_directory: bootstrap-ghc

  # Cabal install
  - if: osx
    then:
      url: https://downloads.haskell.org/~cabal/cabal-install-${{ cabal_version }}/cabal-install-${{ cabal_version }}-x86_64-darwin.tar.xz
      sha256: f9d0cac59deeeb1d35f72f4aa7e5cba3bfe91d838e9ce69b8bc9fc855247ce0f
      target_directory: bootstrap-cabal
  - if: linux
    then:
      url: https://downloads.haskell.org/~cabal/cabal-install-${{ cabal_version }}/cabal-install-${{ cabal_version }}-x86_64-linux-ubuntu20_04.tar.xz
      sha256: 974a0c29cae721a150d5aa079a65f2e1c0843d1352ffe6aedd7594b176c3e1e6
      target_directory: bootstrap-cabal
  - if: not unix
    then:
      url: https://downloads.haskell.org/~cabal/cabal-install-${{ cabal_version }}/cabal-install-${{ cabal_version }}-x86_64-windows.zip
      sha256: e313d60f849d4d7838406c154d60fdef8bfb7214848ac614ebafff19972c194e
      target_directory: bootstrap-cabal

build:
  number: 0
  skip: not (osx and x86_64)

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}

    - if: build_platform != target_platform
      then:
        - gmp
        - libffi

    - if: target_platform == "linux-aarch64"
      then: sysroot_${{ build_platform }} >=2.28

    - if: linux
      then: patchelf

    - if: unix
      then:
        - autoconf
        - automake
        - m4
        - make
        - ncurses
        - sed
      else:
        - m2-autoconf
        - m2-automake-wrapper
        - m2-bash
        - m2-findutils
        - m2-grep
        - m2-m4
        - m2-make
    - gmp
    - llvm-tools <=19
    - python 3.12.*
    - sphinx
    - zstd
  host:
    # - ${{ compiler('c') }}
    - gmp
    - libiconv
    - libffi
    - if: unix
      then:
        - ncurses
  run:
    - c-compiler
    - gmp
    - libffi
    - if: unix
      then:
        - ncurses


tests:
  - package_contents:
      files:
        - etc/bash_completion.d/ghc

        - lib/ghc-${{ version }}/lib/html/**
        - lib/ghc-${{ version }}/lib/latex/haddock.sty
        - lib/ghc-${{ version }}/lib/llvm-passes
        - lib/ghc-${{ version }}/lib/llvm-targets
        - lib/ghc-${{ version }}/lib/package.conf.d/**
        - lib/ghc-${{ version }}/lib/dyld.mjs
        - lib/ghc-${{ version }}/lib/ghc-interp.js
        - lib/ghc-${{ version }}/lib/ghc-usage.txt
        - lib/ghc-${{ version }}/lib/ghci-usage.txt
        - lib/ghc-${{ version }}/lib/post-link.mjs
        - lib/ghc-${{ version }}/lib/prelude.mjs
        - lib/ghc-${{ version }}/lib/settings
        - lib/ghc-${{ version }}/lib/template-hsc.h

        - share/doc/ghc-${{ version }}/html/**
        - share/man/man1/ghc.1

  - script:
      interpreter: python
      content: |
        import os, sys, pathlib
        binaries = [
          "ghc", "ghc-pkg", "ghci", "haddock", "hp2ps",
          "hpc", "hsc2hs", "runghc", "runhaskell"
        ]
        all_files=[f'{b}' for b in binaries] + [f'{b}-${{ version }}' for b in binaries]
        missing=[f for f in all_files if not pathlib.Path(os.environ['CONDA_PREFIX']).joinpath('bin', f).exists()]
        exit(1) if missing else exit(0)

  - script:
      interpreter: python
      content: |
        import os, sys, pathlib
        binaries = [
          "ghc", "ghc-pkg", "runghc", "runhaskell"
        ]
        all_files=[f'{b}' for b in binaries] + [f'{b}-${{ version }}' for b in binaries]
        missing=[f for f in all_files if not pathlib.Path(os.environ['CONDA_PREFIX']).joinpath('lib', 'ghc-${{ version }}', 'bin', f).exists()]
        exit(1) if missing else exit(0)

  - script:
      interpreter: python
      content: |
        import os, sys, pathlib
        binaries = [
          "ghc-iserv", "ghc-iserv-dyn", "ghc-iserv-prof", "unlit",
          "ghc-toolchain-bin","haddock", "hp2ps", "hpc", "hsc2hs",
        ]
        all_files=[f'{b}' for b in binaries] + [f'{b}-ghc-${{ version }}' for b in binaries]
        missing=[f for f in all_files if not pathlib.Path(os.environ['CONDA_PREFIX']).joinpath('lib', 'ghc-${{ version }}', 'bin', f).exists()]
        exit(1) if missing else exit(0)

  - script: |
      ghc --version
      ghc-pkg --version
      ghci --version
      haddock --version
      hp2ps --version
      hpc --version
      hsc2hs --version
      runghc --version
      runhaskell --version

  - script: |
      echo 'main = putStrLn "Hello conda-forge"' > hello.hs
      ghc hello.hs
      ./hello

about:
  homepage: https://haskell.org/ghc/
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Glorious Glasgow Haskell Compilation System
  description: |
    GHC is a state-of-the-art, open source, compiler and interactive environment 
    for the functional language Haskell.
  documentation: https://www.haskell.org/ghc/documentation.html
  repository: https://gitlab.haskell.org/ghc/ghc

extra:
  recipe-maintainers:
    - eggzilla
    - step21
    - xhochy
