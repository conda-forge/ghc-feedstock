context:
  version: "9.6.7"

package:
  name: ghc
  version: ${{ version }}

source:
  - url: https://downloads.haskell.org/~ghc/${{ version }}/ghc-${{ version }}-src.tar.xz
    sha256: d053bf6ce1d588a75cfe8c9316269486e9d8fb89dcdf6fd92836fa2e3df61305
    patches:
      # - patches/add-freeze-libs.patch
      - patches/skip-bindist-recache-crosscompile.patch
      - if: osx and arm64
        then:
          - patches/patch-rpath-macos.patch
          - patches/patch-osname-macos.patch

build:
  number: 0
  skip: not unix

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - binutils
    - if: target_platform != "linux-aarch64" and target_platform != "linux-ppc64le"
      then:
        - cabal ==3.10.3.0
        - ghc-bootstrap ==9.6.7
    - llvm-tools ${{ c_compiler_version }}.*
    - pkg-config
    - python 3.10.*
    - sphinx
    - zstd

    - if: linux
      then:
        - patchelf

    - if: unix
      then:
        - autoconf
        - automake
        - file
        - m4
        - make
        - sed
      else:
        - m2-autoconf
        - m2-automake-wrapper
        - m2-bash
        - m2-findutils
        - m2-grep
        - m2-m4
        - m2-make

    # Cross-compiling
    - if: build_platform != target_platform
      then:
        - gmp
        - libffi
        - libiconv
        - ncurses

    - if: target_platform == "linux-aarch64"
      then:
        # Restrict to 2.43 (2.44 does not seem to have ld.gold and makes aarch64 build fail)
        - binutils_impl_${{ build_platform }} ${{ binutils_version }}.*
        - binutils_impl_${{ target_platform }} ${{ binutils_version }}.*
        # - sysroot_${{ build_platform }} ==${{ c_stdlib_version }}

    # Cross-compiler aarch64 on linux-64
    # Disabled: - if: target_platform == "linux-64"
    # Disabled:   then:
    # Disabled:     - ${{ c_stdlib }}_linux-aarch64 >=${{ c_stdlib_version }}
    # Disabled:     - binutils_impl_linux-aarch64 ${{ binutils_version }}.*
    # Disabled:     - ${{ c_compiler }}_impl_linux-aarch64 ${{ c_compiler_version }}.*
    # Disabled:     - ${{ cxx_compiler }}_impl_linux-aarch64 ${{ cxx_compiler_version }}.*
    # Disabled:     - libgcc-devel_linux-aarch64
  host:
    - gmp
    - libiconv
    - libffi
    - zstd
    - if: unix
      then:
        - ncurses

tests:
  - package_contents:
      bin:
        - ghc
        - ghc-pkg
        - ghci
        - hp2ps
        - hsc2hs
        - if: build_platform == target_platform
          then:
          - haddock
          - hpc
          - runghc
          - runhaskell
        # Disabled: - if: linux and x86_64
        # Disabled:   then:
        # Disabled:     - aarch64-conda-linux-gnu-ghc
        # Disabled:     - aarch64-conda-linux-gnu-ghc-pkg
        # Disabled:     - aarch64-conda-linux-gnu-ghci
        # Disabled:     - aarch64-conda-linux-gnu-hp2ps
        # Disabled:     - aarch64-conda-linux-gnu-hsc2hs
      files:
        - etc/bash_completion.d/ghc
        - etc/conda/activate.d/ghc_activate.sh
        - lib/ghc-${{ version }}/lib/llvm-passes
        - lib/ghc-${{ version }}/lib/llvm-targets
        - lib/ghc-${{ version }}/lib/package.conf.d/**
        - lib/ghc-${{ version }}/lib/ghc-usage.txt
        - lib/ghc-${{ version }}/lib/ghci-usage.txt
        - lib/ghc-${{ version }}/lib/settings
        - lib/ghc-${{ version }}/lib/template-hsc.h
        - if: version != "9.6.7"
          then:
            - lib/ghc-${{ version }}/lib/ghc-interp.js
            - lib/ghc-${{ version }}/lib/post-link.mjs
            - lib/ghc-${{ version }}/lib/*-ghc-${{ version }}/*-inplace/*-inplace.a
          else:
            - lib/ghc-${{ version }}/lib/*-ghc-${{ version }}/**

        # Disabled: - if: linux and x86_64
        # Disabled:   then:
        # Disabled:     # It is too complex to change 'aarch64-unknown-ghc'
        # Disabled:     - lib/aarch64-unknown-ghc-${{ version }}/lib/llvm-passes
        # Disabled:     - lib/aarch64-unknown-ghc-${{ version }}/lib/llvm-targets
        # Disabled:     - lib/aarch64-unknown-ghc-${{ version }}/lib/package.conf.d/**
        # Disabled:     - lib/aarch64-unknown-ghc-${{ version }}/lib/ghc-interp.js
        # Disabled:     - lib/aarch64-unknown-ghc-${{ version }}/lib/ghc-usage.txt
        # Disabled:     - lib/aarch64-unknown-ghc-${{ version }}/lib/ghci-usage.txt
        # Disabled:     - lib/aarch64-unknown-ghc-${{ version }}/lib/post-link.mjs
        # Disabled:     - lib/aarch64-unknown-ghc-${{ version }}/lib/settings
        # Disabled:     - lib/aarch64-unknown-ghc-${{ version }}/lib/template-hsc.h
        # Disabled:     - lib/aarch64-unknown-ghc-${{ version }}/lib/*-ghc-${{ version }}-inplace/*-inplace/*-inplace.a

  - script: |
      ghc --version
      printf 'main = putStrLn "Hello conda-forge"\n' > hello.hs
      ghc hello.hs -o hello && ./hello
      ghc -threaded hello.hs -o hello_t && ./hello_t
      # prof not enabled yet: ghc -prof hello.hs -o hello_p && ./hello_p
      # prof not enabled yet: ghc -threaded -prof hello.hs -o hello_pt && ./hello_pt
    requirements:
      run:
        - ${{ compiler('c') }}
        - libiconv
        - if: unix
          then: ${{ stdlib('c') }}

  - script: |
      printf 'main = putStrLn "Hello conda-forge"\n' > hello.hs
      ghc -dynamic hello.hs && ./hello
      ghc -dynamic -threaded hello.hs -o hello_t && ./hello_t
      # prof not enabled yet: ghc -dynamic -prof hello.hs -o hello_p && ./hello_p
      # prof not enabled yet: ghc -dynamic -threaded -prof hello.hs -o hello_pt && ./hello_pt
    requirements:
      run:
        - ${{ compiler('c') }}
        - libiconv
        - if: unix
          then: ${{ stdlib('c') }}

  - script:
      - printf 'import System.Posix.Signals\nmain = installHandler sigTERM Default Nothing >> putStrLn "Signal test"\n' > signal_test.hs
      - if: unix
        then: |
          ghc signal_test.hs
          ./signal_test
        else: |
          echo Skipping signal test on Windows
    requirements:
      run:
        - ${{ compiler('c') }}
        - libiconv
        - if: unix
          then: ${{ stdlib('c') }}

  # Disabled: - script:
  # Disabled:     - if: linux and x86_64
  # Disabled:       then: |
  # Disabled:         echo "Testing aarch64 cross-compiler..."
  # Disabled:         aarch64-conda-linux-gnu-ghc --version
  # Disabled:         printf 'main = putStrLn "Hello from aarch64 cross-compiler"\n' > cross_hello.hs
  # Disabled:         aarch64-conda-linux-gnu-ghc cross_hello.hs
  # Disabled:         file cross_hello | grep -i aarch64
  # Disabled:         qemu-execve-aarch64 cross_hello
  # Disabled:         echo "Cross-compiler test passed: generated aarch64 object file"
  # Disabled:       else:
  # Disabled:         echo "Skipping cross-compiler test (not available on this platform)"
  # Disabled:   requirements:
  # Disabled:     run:
  # Disabled:       - ${{ compiler('c') }}
  # Disabled:       - if: unix
  # Disabled:         then: ${{ stdlib('c') }}
  # Disabled:       - if: linux and x86_64
  # Disabled:         then:
  # Disabled:         - binutils_linux-aarch64
  # Disabled:         - qemu-execve-aarch64


about:
  homepage: https://haskell.org/ghc/
  license: BSD-3-Clause
  license_file:
    - LICENSE
    # - license_files
  summary: Glorious Glasgow Haskell Compilation System
  description: |
    GHC is a state-of-the-art, open source, compiler and interactive environment 
    for the functional language Haskell.
  documentation: https://www.haskell.org/ghc/documentation.html
  repository: https://gitlab.haskell.org/ghc/ghc

extra:
  recipe-maintainers:
    - eggzilla
    - step21
    - xhochy
