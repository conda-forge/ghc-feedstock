context:
  version: "9.6.7"
  bootstrap_version: "9.2.8"

package:
  name: ghc
  version: ${{ version }}

source:
  - url: https://downloads.haskell.org/~ghc/${{ version }}/ghc-${{ version }}-src.tar.xz
    sha256: d053bf6ce1d588a75cfe8c9316269486e9d8fb89dcdf6fd92836fa2e3df61305
    patches:
      - if: aarch64 or ppc64le or arm64
        then: patches/skip-bindist-recache-crosscompile.patch
      - if: not unix
        then:
          - patches/skip-mingw-copy-conda.patch
          - patches/force-system-gmp-windows.patch
          - patches/add-ffi-include-dir-substitution.patch
          - patches/fix-windows-thriomanager-include.patch
          - patches/add-threadlabels-include-consolehandler.patch
          - patches/fix-windows-utimbuf-type.patch
          - patches/disable-split-sections-windows.patch
          - patches/skip-mingw-detection-error.patch
          - patches/fix-windows-reportmemorymap-format.patch
          - patches/fix-windows-pei386-format.patch
          - patches/fix-windows-mmap-format.patch
          - patches/fix-hp2ps-utilities-stdlib.patch
      - if: osx and arm64
        then:
          - patches/patch-osname-macos.patch

build:
  number: 0
  script:
    env:
      BOOTSTRAP_VERSION: ${{ bootstrap_version }}
  dynamic_linking:
    missing_dso_allowlist:
      - if: osx
        then:
          - /usr/lib/libSystem.B.dylib
      - if: not unix
        then:
          - C:\\Windows\\system32\\SHLWAPI.dll
          - C:\\Windows\\system32\\WINMM.dll
          - C:\\Windows\\system32\\WSOCK32.dll

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    
    - ${{ "m2-" if not unix }}autoconf
    - ${{ "m2-" if not unix }}automake${{ "-wrapper" if not unix }}
    - ${{ "m2-" if not unix }}bash >=5.2
    - ${{ "m2-" if not unix }}file
    - ${{ "m2-" if not unix }}findutils
    - ${{ "m2-" if not unix }}grep
    - ${{ "m2-" if not unix }}m4
    - ${{ "m2-" if not unix }}make
    - ${{ "m2-" if not unix }}tar
    
    - binutils >=${{ binutils_version }}
    - cabal ==3.10.3.0
    - curl
    - ghc-bootstrap ==${{ bootstrap_version }}
    - llvm-tools ${{ c_compiler_version }}.*
    - perl 5.32.*
    - pkg-config
    - python 3.10.*

    - if: not unix
      then:
        - libgcc-devel_win-64
        - m2-coreutils
        - m2-which

    - if: build_platform != target_platform
      then:
        - gmp
        - libffi
        - libiconv
        - ncurses
  host:
    - gmp
    - libffi
    - if: unix
      then:
        - libiconv
        - ncurses
    
tests:
  - package_contents:
      bin:
        - ghc
        - ghc-pkg
        - ghci
        - hp2ps
        - hsc2hs
        - if: build_platform == target_platform
          then:
            - haddock
            - hpc
            - runghc
            - runhaskell
        - if: not unix
          then:
            - ghc_windres.bat
      files:
        - etc/conda/activate.d/ghc_activate.${{ "sh" if unix else "bat" }}
        - if: unix
          then:
            - etc/bash_completion.d/ghc
            - lib/ghc-${{ version }}/lib/llvm-passes
            - lib/ghc-${{ version }}/lib/llvm-targets
            - lib/ghc-${{ version }}/lib/package.conf.d/**
            - lib/ghc-${{ version }}/lib/ghc-usage.txt
            - lib/ghc-${{ version }}/lib/ghci-usage.txt
            - lib/ghc-${{ version }}/lib/settings
            - lib/ghc-${{ version }}/lib/template-hsc.h
            - lib/ghc-${{ version }}/lib/*-ghc-${{ version }}/**
          else:
            - include/**
            - lib/bin/ghc-iserv.exe
            - lib/bin/touchy.exe
            - lib/bin/unlit.exe
            - lib/ghc-usage.txt
            - lib/ghci-usage.txt
            - lib/llvm-passes
            - lib/llvm-targets
            - lib/package.conf.d/**
            - lib/settings
            - lib/template-hsc.h
            - lib/x86_64-windows-ghc-${{ version }}/**

  - script:
      - ghc --version
      - ghc-pkg --version
      - ghci --version
      - hsc2hs --version
      - if: build_platform == target_platform
        then:
          - haddock --version
          - hpc help
          - runghc --version
          - runhaskell --version

  - script:
      - printf 'main = putStrLn "Hello conda-forge"\n' > hello.hs && ghc hello.hs
      - ${{ "./" if unix }}hello
    requirements:
      run:
        - ${{ compiler('c') }}
        - if: unix
          then:
            - ${{ stdlib('c') }}
        - if: linux
          then:
            - ld_impl_${{ target_platform }} ${{ binutils_version }}
        - if: osx or not unix
          then:
            - lld ${{ c_compiler_version }}.*

  - script:
      - printf 'main = putStrLn "Hello threaded conda-forge"\n' > hello.hs && ghc -threaded hello.hs
      - ${{ "./" if unix }}hello
      - if: unix
        then:
          - printf 'main = putStrLn "Hello profiled conda-forge"\n' > hello.hs && ghc -prof hello.hs && ./hello
        else:
          - echo "No profiling on non-unix"
    requirements:
      run:
        - ${{ compiler('c') }}
        - if: unix
          then:
            - ${{ stdlib('c') }}
        - if: linux
          then:
            - ld_impl_${{ target_platform }} ${{ binutils_version }}
        - if: osx or not unix
          then:
            - lld ${{ c_compiler_version }}.*

  - script:
      - if: unix
        then:
          - printf 'main = putStrLn "Hello conda-forge"\n' > hello.hs && ghc -dynamic hello.hs && ./hello
          - printf 'main = putStrLn "Hello threaded conda-forge"\n' > hello_t.hs
          - ghc -dynamic -threaded hello_t.hs && ./hello_t
        else:
          - echo "No dyn on non-unix"
    requirements:
      run:
        - ${{ compiler('c') }}
        - if: unix
          then:
            - ${{ stdlib('c') }}
        - if: linux
          then:
            - ld_impl_${{ target_platform }} ${{ binutils_version }}
        - if: osx
          then:
            - lld ${{ c_compiler_version }}.*

  - script:
      - printf 'import System.Posix.Signals\nmain = installHandler sigTERM Default Nothing >> putStrLn "Signal test"\n' > signal_test.hs
      - if: unix
        then: |
          ghc signal_test.hs
          ./signal_test
        else: |
          echo Skipping signal test on Windows
    requirements:
      run:
        - ${{ compiler('c') }}
        - if: unix
          then:
            - ${{ stdlib('c') }}
        - if: linux
          then:
            - ld_impl_${{ target_platform }} ${{ binutils_version }}
        - if: osx
          then:
            - lld ${{ c_compiler_version }}.*


about:
  homepage: https://haskell.org/ghc/
  license: BSD-3-Clause
  license_file:
    - LICENSE
  summary: Glorious Glasgow Haskell Compilation System
  description: |
    GHC is a state-of-the-art, open source, compiler and interactive environment 
    for the functional language Haskell.
  documentation: https://www.haskell.org/ghc/documentation.html
  repository: https://gitlab.haskell.org/ghc/ghc

extra:
  recipe-maintainers:
    - eggzilla
    - step21
    - xhochy
