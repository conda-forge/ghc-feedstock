context:
  version: "9.12.2"

package:
  name: ghc
  version: ${{ version }}

source:
  - url: https://downloads.haskell.org/~ghc/${{ version }}/ghc-${{ version }}-src.tar.xz
    sha256: 0e49cd5dde43f348c5716e5de9a5d7a0f8d68d945dc41cf75dfdefe65084f933
    patches:
      - patch-rpath-macos.patch
  - if: target_platform == "win-64"
    then:
      url: https://downloads.haskell.org/~ghc/${{ version }}/ghc-${{ version }}-windows-extra-src.tar.gz
      sha256: 84f3cfc2567f226dd8b74e1afad4c1c15b82e9fc13baa3a58b9a0d4345ff6505

  # Bootstrap GHC compilers
  # - if: target_platform == "osx-arm64"
  #   then:
