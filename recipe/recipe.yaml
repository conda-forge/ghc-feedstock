context:
  version: "9.6.7"

package:
  name: ghc
  version: ${{ version }}

source:
  - url: https://downloads.haskell.org/~ghc/${{ version }}/ghc-${{ version }}-src.tar.xz
    sha256: d053bf6ce1d588a75cfe8c9316269486e9d8fb89dcdf6fd92836fa2e3df61305
    patches:
      # - patches/add-freeze-libs.patch
      - patches/skip-bindist-recache-crosscompile.patch
      - if: osx and arm64
        then:
          - patches/patch-rpath-macos.patch
          - patches/patch-osname-macos.patch

build:
  number: 0
  skip: not unix

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - binutils >=${{ binutils_version }}
    - if: target_platform != "linux-aarch64" and target_platform != "linux-ppc64le"
      then:
        - cabal ==3.10.3.0
        - ghc-bootstrap ==9.6.7
    - llvm-tools ${{ c_compiler_version }}.*
    - pkg-config
    - python 3.10.*
    - sphinx
    - zstd

    - if: unix
      then:
        - autoconf
        - automake
        - file
        - m4
        - make
        - sed
      else:
        - m2-autoconf
        - m2-automake-wrapper
        - m2-bash
        - m2-findutils
        - m2-grep
        - m2-m4
        - m2-make

    - if: build_platform != target_platform
      then:
        - gmp
        - libffi
        - libiconv
        - ncurses

    # - if: target_platform == "linux-aarch64"
    #   then:
    #     # Restrict to 2.43 (2.44 does not seem to have ld.gold and makes aarch64 build fail)
    #     - binutils_impl_${{ build_platform }} ${{ binutils_version }}.*
    #     - binutils_impl_${{ target_platform }} ${{ binutils_version }}.*
  host:
    - gmp
    - libiconv
    - libffi
    - zstd
    - if: unix
      then:
        - ncurses
    
tests:
  - package_contents:
      bin:
        - ghc
        - ghc-pkg
        - ghci
        - hp2ps
        - hsc2hs
        - if: build_platform == target_platform
          then:
            - haddock
            - hpc
            - runghc
            - runhaskell
      files:
        - etc/bash_completion.d/ghc
        - etc/conda/activate.d/ghc_activate.sh
        - lib/ghc-${{ version }}/lib/llvm-passes
        - lib/ghc-${{ version }}/lib/llvm-targets
        - lib/ghc-${{ version }}/lib/package.conf.d/**
        - lib/ghc-${{ version }}/lib/ghc-usage.txt
        - lib/ghc-${{ version }}/lib/ghci-usage.txt
        - lib/ghc-${{ version }}/lib/settings
        - lib/ghc-${{ version }}/lib/template-hsc.h
        - if: version != "9.6.7"
          then:
            - lib/ghc-${{ version }}/lib/ghc-interp.js
            - lib/ghc-${{ version }}/lib/post-link.mjs
            - lib/ghc-${{ version }}/lib/*-ghc-${{ version }}/*-inplace/*-inplace.a
          else:
            - lib/ghc-${{ version }}/lib/*-ghc-${{ version }}/**

  - script: |
      ghc --version
      printf 'main = putStrLn "Hello conda-forge"\n' > hello.hs
      ghc hello.hs && ./hello
      printf 'main = putStrLn "Hello profiled conda-forge"\n' > hello_p.hs
      ghc -prof hello_p.hs && ./hello_p
      printf 'main = putStrLn "Hello threaded conda-forge"\n' > hello_t.hs
      ghc -threaded hello_t.hs && ./hello_t
    requirements:
      run:
        - ${{ compiler('c') }}
        - libiconv
        - if: unix
          then: ${{ stdlib('c') }}
        - if: osx
          then: lld

  - script: |
      printf 'main = putStrLn "Hello conda-forge"\n' > hello.hs
      ghc -dynamic hello.hs && ./hello
      printf 'main = putStrLn "Hello threaded conda-forge"\n' > hello_t.hs
      ghc -dynamic -threaded hello_t.hs && ./hello_t
    requirements:
      run:
        - ${{ compiler('c') }}
        - libiconv
        - if: unix
          then: ${{ stdlib('c') }}
        - if: osx
          then: lld

  - script:
      - printf 'import System.Posix.Signals\nmain = installHandler sigTERM Default Nothing >> putStrLn "Signal test"\n' > signal_test.hs
      - if: unix
        then: |
          ghc signal_test.hs
          ./signal_test
        else: |
          echo Skipping signal test on Windows
    requirements:
      run:
        - ${{ compiler('c') }}
        - libiconv
        - if: unix
          then: ${{ stdlib('c') }}


about:
  homepage: https://haskell.org/ghc/
  license: BSD-3-Clause
  license_file:
    - LICENSE
    # - license_files
  summary: Glorious Glasgow Haskell Compilation System
  description: |
    GHC is a state-of-the-art, open source, compiler and interactive environment 
    for the functional language Haskell.
  documentation: https://www.haskell.org/ghc/documentation.html
  repository: https://gitlab.haskell.org/ghc/ghc

extra:
  recipe-maintainers:
    - eggzilla
    - step21
    - xhochy
